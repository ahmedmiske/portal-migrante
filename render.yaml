services:
  - type: web
    name: portal-migrante
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://portal-migrante-frontend.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://portal-migrante-frontend.onrender.com
      - key: MONGO_URI
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false

  - type: static
    name: portal-migrante-frontend
    rootDir: portal-migrante/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://portal-migrante.onrender.com/api
